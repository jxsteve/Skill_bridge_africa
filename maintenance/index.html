<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>SkillBridge Africa</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f8fafb;
        color: #374151;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
      }
      .mark {
        width: 56px;
        height: 90px;
        margin: 0 auto 24px;
        background: #124cc9;
        border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        transform: rotate(8deg);
      }
      .wordmark {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
      }
      .wordmark .skill { color: #124cc9; }
      .wordmark .bridge { color: #107535; }
      .africa {
        color: #124cc9;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 4px;
        margin-bottom: 32px;
      }
      h1 {
        font-size: 20px;
        color: #111827;
        margin-bottom: 12px;
      }
      p {
        font-size: 15px;
        line-height: 1.6;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark"></div>
      <div class="wordmark"><span class="skill">Skill</span><span class="bridge">Bridge</span></div>
      <div class="africa">– AFRICA –</div>
      <h1>Preview temporarily unavailable</h1>
      <p>This demo is offline for now. Please check back soon.</p>
    </div>
  </body>
</html>
